const LOGIN_API_URL = VERCEL_API_URL.replace('/api/chat', '/api/login');

function hideLoginOverlay() {
  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('logout-btn').style.display = 'block';
}

document.addEventListener('DOMContentLoaded', () => {
  const loginBtn = document.getElementById('login-btn');
  const passwordInput = document.getElementById('login-password');
  const loginError = document.getElementById('login-error');

  async function attemptLogin() {
    const pw = passwordInput.value;
    if (!pw) return;

    loginError.style.display = 'none';
    loginBtn.disabled = true;
    loginBtn.textContent = '로그인 중...';

    try {
      const resp = await fetch(LOGIN_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw })
      });

      if (!resp.ok) {
        const data = await resp.json();
        throw new Error(data.error || '로그인 실패');
      }

      const { token } = await resp.json();
      await auth.signInWithCustomToken(token);
    } catch (e) {
      loginBtn.disabled = false;
      loginBtn.textContent = '로그인';
      loginError.textContent = e.message;
      loginError.style.display = 'block';
      passwordInput.value = '';
      passwordInput.focus();
    }
  }

  loginBtn.addEventListener('click', attemptLogin);
  passwordInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') attemptLogin();
  });

  document.getElementById('logout-btn').addEventListener('click', () => {
    auth.signOut().then(() => location.reload());
  });
});

function executeAITool(toolName, toolInput) {
  console.log(`도구 실행: ${toolName}`, toolInput);
  
  switch(toolName) {
    case "get_unvisited_stores":
      return getUnvisitedStores(toolInput.region);
      
    case "get_visited_stores":
      return getVisitedStores(toolInput.region);
      
    case "get_completion_rate":
      return getCompletionRate(toolInput.region);
      
    case "get_store_info":
      return getStoreInfo(toolInput.store_number);
      
    case "get_stores_by_region":
      return getStoresByRegion(toolInput.region);
      
    case "plan_route":
      return planRoute(toolInput.store_numbers);
      
    case "get_region_statistics":
      return getRegionStatistics(toolInput.level);

    case "find_nearby_parking":
      return findNearbyParking(toolInput.store_number, toolInput.radius);

    default:
      return { error: "알 수 없는 도구입니다." };
  }
}

function getUnvisitedStores(region) {
  let filtered = stores.filter(store => {
    const data = storeData[store.num] || { visited: false };
    return !data.visited;
  });
  
  if (region) {
    filtered = filtered.filter(store => store.address.includes(region));
  }
  
  return {
    총개수: filtered.length,
    매장목록: filtered.map(s => ({
      번호: s.num,
      이름: s.name,
      주소: s.address
    }))
  };
}

function getVisitedStores(region) {
  let filtered = stores.filter(store => {
    const data = storeData[store.num] || { visited: false };
    return data.visited;
  });
  
  if (region) {
    filtered = filtered.filter(store => store.address.includes(region));
  }
  
  return {
    총개수: filtered.length,
    매장목록: filtered.map(s => ({
      번호: s.num,
      이름: s.name,
      주소: s.address,
      담당자: storeData[s.num]?.manager || '없음',
      방문날짜: storeData[s.num]?.visitDate || '없음',
      코멘트: storeData[s.num]?.comment || '없음'
    }))
  };
}

function getCompletionRate(region) {
  let filtered = stores;
  
  if (region) {
    filtered = stores.filter(store => store.address.includes(region));
  }
  
  const total = filtered.length;
  const completed = filtered.filter(store => {
    const data = storeData[store.num] || { visited: false };
    return data.visited;
  }).length;
  
  return {
    지역: region || "전체",
    전체매장: total,
    완료매장: completed,
    미방문매장: total - completed,
    완료율: total > 0 ? Math.round((completed / total) * 100) + "%" : "0%"
  };
}

function getStoreInfo(storeNumber) {
  const store = stores.find(s => s.num === storeNumber);
  if (!store) return { error: "매장을 찾을 수 없습니다." };
  
  const data = storeData[storeNumber] || { visited: false, comment: "" };
  
  return {
    번호: store.num,
    이름: store.name,
    주소: store.address,
    방문상태: data.visited ? "방문완료" : "미방문",
    담당자: data.manager || "없음",
    방문날짜: data.visitDate || "없음",
    코멘트: data.comment || "없음",
    최종수정일: data.updatedAt || "없음"
  };
}

function getStoresByRegion(region) {
  const filtered = stores.filter(store => store.address.includes(region));
  
  const visited = filtered.filter(s => {
    const data = storeData[s.num] || { visited: false };
    return data.visited;
  }).length;
  
  return {
    지역: region,
    전체매장: filtered.length,
    방문완료: visited,
    미방문: filtered.length - visited,
    매장목록: filtered.map(s => ({
      번호: s.num,
      이름: s.name,
      주소: s.address,
      방문완료: storeData[s.num]?.visited ? "완료" : "미방문"
    }))
  };
}

function planRoute(storeNumbers) {
  const selectedStores = stores.filter(s => storeNumbers.includes(s.num));
  
  if (selectedStores.length === 0) {
    return { error: "선택된 매장이 없습니다." };
  }
  
  const grouped = {};
  selectedStores.forEach(store => {
    const parts = store.address.split(' ');
    const region = parts[0] + ' ' + parts[1];
    if (!grouped[region]) grouped[region] = [];
    grouped[region].push({
      번호: store.num,
      이름: store.name,
      주소: store.address
    });
  });
  
  return {
    총매장수: selectedStores.length,
    지역수: Object.keys(grouped).length,
    지역별그룹: grouped,
    추천동선: "같은 지역 매장들을 먼저 방문하는 것이 효율적입니다."
  };
}

function getRegionStatistics(level) {
  const stats = {};
  
  stores.forEach(store => {
    const parts = store.address.split(' ');
    let key;
    
    if (level === "시도") {
      key = parts[0];
    } else {
      key = parts[0] + ' ' + parts[1];
    }
    
    if (!stats[key]) {
      stats[key] = { 전체: 0, 완료: 0, 미방문: 0 };
    }
    
    stats[key].전체++;
    
    const data = storeData[store.num] || { visited: false };
    if (data.visited) {
      stats[key].완료++;
    } else {
      stats[key].미방문++;
    }
  });
  
  Object.keys(stats).forEach(key => {
    const s = stats[key];
    s.완료율 = Math.round((s.완료 / s.전체) * 100) + "%";
  });
  
  return {
    통계레벨: level,
    지역수: Object.keys(stats).length,
    지역별통계: stats
  };
}

// ============================================
// 공영주차장 근처 검색
// ============================================
function findNearbyParking(storeNumber, radius) {
  radius = radius || 500;

  const markerObj = markers.find(m => m.storeNum === storeNumber);
  if (!markerObj) {
    const store = stores.find(s => s.num === storeNumber);
    if (!store) return { error: storeNumber + "번 매장을 찾을 수 없습니다." };
    return { 안내: storeNumber + "번 매장(" + store.name + ")의 지도 좌표가 아직 로드되지 않았습니다. 지도가 완전히 로드된 후 다시 질문해주세요." };
  }

  const storeLat = markerObj.marker.getPosition().lat();
  const storeLng = markerObj.marker.getPosition().lng();
  const store = stores.find(s => s.num === storeNumber);

  const cachedParking = Object.values(parkingGeocoded);
  if (cachedParking.length === 0) {
    return { 안내: "공영주차장 데이터가 아직 로드되지 않았습니다. 지도 오른쪽 상단의 '🅿️ 공영주차장 찾기' 버튼을 먼저 클릭해서 데이터를 불러온 후 다시 질문해주세요." };
  }

  function getDistanceM(lat1, lng1, lat2, lng2) {
    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLng/2) * Math.sin(dLng/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  const nearby = cachedParking
    .map(p => ({ ...p, 거리m: Math.round(getDistanceM(storeLat, storeLng, p.lat, p.lng)) }))
    .filter(p => p.거리m <= radius)
    .sort((a, b) => a.거리m - b.거리m);

  return {
    매장번호: storeNumber,
    매장이름: store ? store.name : "",
    매장주소: store ? store.address : "",
    검색반경: radius + "m",
    검색된주차장수: nearby.length,
    주차장목록: nearby.map(p => ({ 이름: p.name, 주소: p.address, 거리: p.거리m + "m" }))
  };
}

async function askChatAI(question) {
  addChatMessage(question, true);
  document.getElementById('chat-input').value = '';
  
  const thinkingId = 'thinking-' + Date.now();
  const messagesDiv = document.getElementById('chat-messages');
  const thinkingDiv = document.createElement('div');
  thinkingDiv.id = thinkingId;
  thinkingDiv.className = 'chat-message ai';
  thinkingDiv.innerHTML = '<div class="message-bubble">🤔 생각 중...</div>';
  messagesDiv.appendChild(thinkingDiv);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
  
  let messages = [{
    role: 'user',
    content: question
  }];
  
  const systemPrompt = `당신은 대리점 방문 관리를 돕는 AI 에이전트입니다.

현재 전체 ${stores.length}개 매장 중 ${Object.values(storeData).filter(d => d.visited).length}개를 방문 완료했습니다.

사용 가능한 도구를 활용해서 정확한 데이터를 조회하고 분석해주세요.
- 지역 검색 시 정확한 도구를 사용하세요
- 동선 계획 시 지역별로 그룹화하여 제안하세요
- 통계 요청 시 적절한 레벨(시도/구)로 조회하세요
- 매장 근처 주차장 질문 시 find_nearby_parking 도구를 사용하세요 (기본 반경 500m)
- find_nearby_parking 결과에 '안내' 필드가 있으면 시스템 오류가 아닙니다. 안내 내용을 친절하게 전달하세요.
- 주차장 데이터가 없을 경우 사용자에게 지도 우측의 '🅿️ 공영주차장 찾기' 버튼을 먼저 눌러달라고 안내하세요.

친절하고 구체적으로 답변해주세요.`;
  
  try {
    for (let i = 0; i < 10; i++) {
      const response = await fetch(VERCEL_API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          messages: [
            { role: 'system', content: systemPrompt },
            ...messages
          ],
          tools: aiTools
        })
      });
      
      const result = await response.json();
      console.log('AI 응답:', result);
      
      if (result.error) {
        throw new Error(result.error.message || result.error);
      }
      
      if (result.stop_reason === 'end_turn') {
        document.getElementById(thinkingId)?.remove();
        
        const textContent = result.content.find(c => c.type === 'text');
        if (textContent) {
          addChatMessage(textContent.text, false);
        }
        break;
      }
      
      if (result.stop_reason === 'tool_use') {
        const toolUses = result.content.filter(c => c.type === 'tool_use');
        
        if (toolUses.length > 0) {
          const thinking = document.getElementById(thinkingId);
          if (thinking) {
            thinking.querySelector('.message-bubble').textContent =
              `🔧 ${toolUses.map(t => t.name).join(', ')} 실행 중...`;
          }

          // assistant 메시지 추가 (모든 content 포함)
          messages.push({
            role: 'assistant',
            content: result.content
          });

          // 모든 tool_use에 대한 tool_result를 한 번에 반환
          const toolResults = toolUses.map(toolUse => {
            console.log(`도구 사용: ${toolUse.name}`, toolUse.input);
            const toolResult = executeAITool(toolUse.name, toolUse.input);
            console.log('도구 결과:', toolResult);
            return {
              type: 'tool_result',
              tool_use_id: toolUse.id,
              content: JSON.stringify(toolResult)
            };
          });

          messages.push({
            role: 'user',
            content: toolResults
          });

          continue;
        }
      }
      
      break;
    }
    
  } catch (error) {
    console.error('AI 에이전트 오류:', error);
    document.getElementById(thinkingId)?.remove();
    addChatMessage(`오류가 발생했습니다: ${error.message}

API 연결을 확인해주세요.`, false);
  }
}

async function initializeApp() {
  await loadDataFromFirebase();
  
  naver.maps.onJSContentLoaded = function(){
    map = new naver.maps.Map("map", {
      center: new naver.maps.LatLng(36.5, 127.5),
      zoom: 7
    });

    const bounds = new naver.maps.LatLngBounds();

    stores.forEach((store,index)=>{
      if (!storeData[store.num]) {
        storeData[store.num] = {visited: false, comment: ""};
      }

      setTimeout(()=>{
        naver.maps.Service.geocode(
          {query:store.address},
          function(status,res){
            if(status !== naver.maps.Service.Status.OK) return;

            const addr = res.v2.addresses[0];
            const pos = new naver.maps.LatLng(addr.y, addr.x);
            bounds.extend(pos);

            const isVisited = storeData[store.num].visited ? 'visited' : '';
            const currentZoom = map.getZoom();

            let content;
            if (currentZoom >= 13) {
              content = `
                <div class="bubble-full ${isVisited}" id="b-${store.num}">
                  ${store.num}. ${store.name}
                </div>
              `;
            } else {
              content = `
                <div class="bubble-simple ${isVisited}" id="b-${store.num}">
                  ${store.num}
                </div>
              `;
            }

            const marker = new naver.maps.Marker({
              position: pos,
              map: map,
              icon:{
                content: content,
                anchor: new naver.maps.Point(15, 15)
              }
            });

            markers.push({
              marker: marker,
              storeNum: store.num
            });

            naver.maps.Event.addListener(marker,"click",()=>{
              openModal(store.num);
            });

            if(index === stores.length-1){
              map.fitBounds(bounds);
              updateProgress();
            }
          }
        );
      }, index*15);
    });

    naver.maps.Event.addListener(map, 'zoom_changed', function() {
      const zoom = map.getZoom();
      updateMarkerLabels(zoom);
      updateParkingOnZoom(zoom);
    });
  };
  
  if (typeof naver !== 'undefined' && naver.maps) {
    naver.maps.onJSContentLoaded();
  }
}

// ============================================
// 실시간 GPS 위치 추적
// ============================================
let gpsWatchId = null;
let myLocationMarker = null;
let myLocationCircle = null;
let gpsActive = false;

function startGPS() {
  if (!navigator.geolocation) {
    alert('이 브라우저는 GPS를 지원하지 않습니다.');
    return;
  }

  gpsActive = true;
  const btn = document.getElementById('gps-btn');
  btn.classList.add('active');
  btn.textContent = '📍 추적 중...';

  gpsWatchId = navigator.geolocation.watchPosition(
    function(pos) {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const accuracy = pos.coords.accuracy; // 정확도(미터)
      const myPos = new naver.maps.LatLng(lat, lng);

      // 기존 마커/원 제거
      if (myLocationMarker) myLocationMarker.setMap(null);
      if (myLocationCircle) myLocationCircle.setMap(null);

      // 내 위치 마커
      myLocationMarker = new naver.maps.Marker({
        position: myPos,
        map: map,
        icon: {
          content: '<div style="width:16px;height:16px;background:#2196f3;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.4);"></div>',
          anchor: new naver.maps.Point(8, 8)
        },
        zIndex: 999
      });

      // 정확도 원
      myLocationCircle = new naver.maps.Circle({
        map: map,
        center: myPos,
        radius: accuracy,
        fillColor: '#2196f3',
        fillOpacity: 0.1,
        strokeColor: '#2196f3',
        strokeOpacity: 0.4,
        strokeWeight: 1
      });

      // 첫 수신 시 지도 이동
      if (btn.textContent === '📍 추적 중...') {
        map.setCenter(myPos);
        map.setZoom(15);
        btn.textContent = '🔴 추적 중지';
      }
    },
    function(err) {
      console.error('GPS 오류:', err);
      if (err.code === 1) alert('위치 접근이 거부되었습니다. 브라우저 설정에서 위치 권한을 허용해주세요.');
      else if (err.code === 2) alert('위치를 가져올 수 없습니다. GPS 신호를 확인해주세요.');
      stopGPS();
    },
    {
      enableHighAccuracy: true,  // 고정밀 GPS 사용
      maximumAge: 0,             // 캐시 사용 안 함
      timeout: 10000             // 10초 타임아웃
    }
  );
}

function stopGPS() {
  if (gpsWatchId !== null) {
    navigator.geolocation.clearWatch(gpsWatchId);
    gpsWatchId = null;
  }
  gpsActive = false;
  if (myLocationMarker) { myLocationMarker.setMap(null); myLocationMarker = null; }
  if (myLocationCircle) { myLocationCircle.setMap(null); myLocationCircle = null; }
  const btn = document.getElementById('gps-btn');
  btn.classList.remove('active');
  btn.textContent = '📍 내 위치 추적';
}

function toggleGPS() {
  if (gpsActive) stopGPS();
  else startGPS();
}

document.getElementById('gps-btn').addEventListener('click', toggleGPS);

// ============================================
// 따릉이 대여소 기능
// ============================================
let bikeMarkers = [];
let bikeActive = false;

function showBikeStations() {
  const zoom = map.getZoom();
  if (zoom < 13) {
    alert('따릉이 대여소는 지도를 더 확대(1:100m 이하)한 후 사용할 수 있습니다.');
    return;
  }

  bikeActive = true;
  const btn = document.getElementById('bike-btn');
  btn.classList.add('active');
  btn.textContent = '🚲 대여소 숨기기';

  // 현재 지도 영역 가져오기
  const bounds = map.getBounds();

  BIKE_RAW.forEach(function(station) {
    const lat = parseFloat(station.lat);
    const lng = parseFloat(station.lng);
    if (isNaN(lat) || isNaN(lng)) return;

    // 현재 화면 범위 내 대여소만 표시
    const pos = new naver.maps.LatLng(lat, lng);
    if (!bounds.hasLatLng(pos)) return;

    const marker = new naver.maps.Marker({
      position: pos,
      map: map,
      icon: {
        content: '<div style="background:#4caf50;color:#fff;padding:3px 7px;border-radius:12px;font-size:11px;font-weight:bold;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,0.3);">🚲</div>',
        anchor: new naver.maps.Point(12, 12)
      },
      zIndex: 500
    });

    // 클릭 시 정보 표시
    naver.maps.Event.addListener(marker, 'click', function() {
      const infoWindow = new naver.maps.InfoWindow({
        content: '<div style="padding:10px;font-size:13px;max-width:200px;">' +
          '<b>🚲 ' + station.name + '</b><br>' +
          '<span style="color:#666;font-size:12px;">' + station.addr + '</span>' +
          '</div>',
        borderWidth: 0,
        backgroundColor: '#fff',
        borderRadius: '8px',
        boxShadow: '0 2px 8px rgba(0,0,0,0.2)'
      });
      infoWindow.open(map, marker);
    });

    bikeMarkers.push(marker);
  });

  console.log('따릉이 대여소 표시:', bikeMarkers.length + '개');
}

function hideBikeStations() {
  bikeMarkers.forEach(m => m.setMap(null));
  bikeMarkers = [];
  bikeActive = false;
  const btn = document.getElementById('bike-btn');
  btn.classList.remove('active');
  btn.textContent = '🚲 따릉이 대여소';
}

function toggleBike() {
  if (bikeActive) hideBikeStations();
  else showBikeStations();
}

document.getElementById('bike-btn').addEventListener('click', toggleBike);

let parkingMarkers = [];
let parkingVisible = false;
let parkingGeocoded = {};
let parkingLoading = false;
const PARKING_MIN_ZOOM = 13;
const PARKING_CACHE_KEY = 'parkingGeocoded_v1';

// localStorage에서 캐시 불러오기
function loadParkingCache() {
  try {
    const saved = localStorage.getItem(PARKING_CACHE_KEY);
    if (saved) {
      parkingGeocoded = JSON.parse(saved);
      console.log('주차장 캐시 로드:', Object.keys(parkingGeocoded).length + '개');
    }
  } catch(e) {}
}

// localStorage에 캐시 저장
function saveParkingCache() {
  try {
    localStorage.setItem(PARKING_CACHE_KEY, JSON.stringify(parkingGeocoded));
  } catch(e) {}
}

function isParkingZoomOk() {
  return map && map.getZoom() >= PARKING_MIN_ZOOM;
}



function clearParkingMarkers() {
  parkingMarkers.forEach(m => m.setMap(null));
  parkingMarkers = [];
}

function renderParkingFromCache() {
  if (!parkingVisible || !isParkingZoomOk()) return;
  clearParkingMarkers();
  const bounds = map.getBounds();
  Object.values(parkingGeocoded).forEach(p => {
    const pos = new naver.maps.LatLng(p.lat, p.lng);
    if (!bounds.hasLatLng(pos)) return;
    const marker = new naver.maps.Marker({
      position: pos,
      map: map,
      icon: {
        content: '<div class="parking-bubble" title="' + p.address + '">🅿️ ' + p.name + '</div>',
        anchor: new naver.maps.Point(60, 30)
      },
      zIndex: 50
    });
    parkingMarkers.push(marker);
  });
}

function startGeocodeAll() {
  const toGeocode = PARKING_RAW.filter(p => !parkingGeocoded[p.address]);
  const total = PARKING_RAW.length;
  const btn = document.getElementById('parking-btn');

  if (toGeocode.length === 0) {
    parkingLoading = false;
    renderParkingFromCache();
    btn.textContent = '🅿️ 주차장 숨기기';
    return;
  }

  parkingLoading = true;
  let completed = 0;
  let startIdx = 0;
  const CONCURRENCY = 5; // 동시 요청 수
  const cached = Object.keys(parkingGeocoded).length;

  function updateBtn() {
    const done = cached + completed;
    btn.textContent = '🅿️ 로딩 중... ' + done + '/' + total;
  }

  function runOne(p) {
    if (!parkingVisible) { parkingLoading = false; return; }
    naver.maps.Service.geocode({ query: '서울시 ' + p.address }, function(status, res) {
      if (!parkingVisible) { parkingLoading = false; return; }
      if (status === naver.maps.Service.Status.OK && res.v2.addresses.length > 0) {
        const addr = res.v2.addresses[0];
        parkingGeocoded[p.address] = {
          name: p.name, address: p.address,
          lat: parseFloat(addr.y), lng: parseFloat(addr.x)
        };
      }
      completed++;
      updateBtn();

      // 100개마다 캐시 저장 + 현재 화면 렌더
      if (completed % 100 === 0) {
        saveParkingCache();
        renderParkingFromCache();
      }

      // 다음 항목 처리
      if (startIdx < toGeocode.length) {
        const next = toGeocode[startIdx++];
        setTimeout(() => runOne(next), 10);
      } else if (completed >= toGeocode.length) {
        // 전체 완료
        parkingLoading = false;
        saveParkingCache();
        renderParkingFromCache();
        btn.textContent = '🅿️ 주차장 숨기기';
      }
    });
  }

  // CONCURRENCY 만큼 동시 시작
  const initialBatch = Math.min(CONCURRENCY, toGeocode.length);
  for (let i = 0; i < initialBatch; i++) {
    const p = toGeocode[startIdx++];
    setTimeout(() => runOne(p), i * 10);
  }

  updateBtn();
  renderParkingFromCache(); // 캐시된 것 즉시 표시
}

function toggleParking() {
  if (!isParkingZoomOk()) {
    return;
  }
  parkingVisible = !parkingVisible;
  const btn = document.getElementById('parking-btn');

  if (parkingVisible) {
    btn.classList.add('active');
    startGeocodeAll();
  } else {
    parkingLoading = false;
    btn.classList.remove('active');
    btn.textContent = '🅿️ 공영주차장 찾기';
    clearParkingMarkers();
  }
}

function updateParkingOnZoom(zoom) {
  if (zoom < PARKING_MIN_ZOOM) {
    // 줌 1:100m 초과: 표시 중이면 숨기고 메시지
    if (parkingVisible) {
      parkingVisible = false;
      parkingLoading = false;
      const btn = document.getElementById('parking-btn');
      btn.classList.remove('active');
      btn.textContent = '🅿️ 공영주차장 찾기';
      clearParkingMarkers();
    }
    } else {
    // 줌 1:100m 이하: 표시 중이면 bounds 갱신
    if (parkingVisible && !parkingLoading) {
      renderParkingFromCache();
    }
  }
}

// 앱 초기화 시 캐시 로드
loadParkingCache();

document.getElementById('parking-btn').addEventListener('click', toggleParking);



</script>
